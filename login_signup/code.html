<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
</div>

<form class="space-y-6" onsubmit="return false;">
<div class="space-y-1.5">
<label class="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider ml-1" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors text-xl">mail</span>
<input class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary/40 rounded-xl py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline/50 transition-all outline-none text-sm" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="space-y-1.5">

<label class="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
